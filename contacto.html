<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - NextSet</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/cta.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
      <div class="container">
        <h1 class="logo">Next<span>Set</span></h1>
        <nav class="main-nav">
          <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="servicios.html">Servicios</a></li>
            <li><a href="contacto.html" class="active">Contacto</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <main style="margin-top: 120px; min-height: 70vh; padding-bottom: 50px;">
      <section class="container" style="max-width: 700px;">
        <div class="section_title__container">
          <h2 class="section-title">¿Hablamos de tu proyecto?</h2>
          <p class="section-subtitle" id="section_subtitle__dark" style="color: white; font-weight: bold;">
            Rellena el formulario y nos pondremos en contacto contigo lo antes posible.
          </p>
        </div>
        <form action="#" class="feature-card" style="text-align: left; background: #222; border: 2px solid var(--primary-orange);">
          <div style="margin-bottom: 20px;">
            <label style="display: block; color: var(--primary-orange); font-family: 'Bebas Neue'; font-size: 1.2rem; margin-bottom: 8px;">Nombre Completo</label>
            <input type="text" required placeholder="Tu nombre" style="width: 100%; padding: 12px; background: #333; border: 1px solid #444; color: white; border-radius: 5px;">
          </div>
          <div style="margin-bottom: 20px;">
            <label style="display: block; color: var(--primary-orange); font-family: 'Bebas Neue'; font-size: 1.2rem; margin-bottom: 8px;">Correo Electrónico</label>
            <input type="email" required placeholder="email@ejemplo.com" style="width: 100%; padding: 12px; background: #333; border: 1px solid #444; color: white; border-radius: 5px;">
          </div>
          <div style="margin-bottom: 25px;">
            <label style="display: block; color: var(--primary-orange); font-family: 'Bebas Neue'; font-size: 1.2rem; margin-bottom: 8px;">Tu mensaje</label>
            <textarea required rows="5" placeholder="¿En qué podemos ayudarte?" style="width: 100%; padding: 12px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; resize: none;"></textarea>
          </div>
          <button type="submit" class="btn-primary" style="width: 100%; border: none; cursor: pointer; font-size: 1.1rem;">
            Enviar Mensaje
          </button>
        </form>
      </section>
    </main>
    <footer class="main-footer">
        </footer>
</body>
</html>
